<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Signup.css">
    <script src="https://kit.fontawesome.com/6580a563ab.js" crossorigin="anonymous"></script>
    <title>SignUP</title>
</head>
<body>
    <div class="container">

        <form id="form">
            <div class="title">GetStarted</div>
            <!--first name input here-->
            <div>
                <label for="firstname">First Name:</label>
                <i class="fa-solid fa-user"></i>
                <input type="text" name="firstname" id="firstname" placeholder="First Name">
                <i class="fa-sharp fa-solid fa-circle-exclamation failure-icon"></i>
                <i class="fa-sharp fa-solid fa-circle-check success-icon"></i>
                <div class="error"></div>
            </div>
             <!--Last name input here-->
             <div>
                <label for="lastname">Last Name:</label>
                <i class="fa-solid fa-user"></i>
                <input type="text" name="lastname" id="lastname" placeholder="Last Name">
                <i class="fa-sharp fa-solid fa-circle-exclamation failure-icon"></i>
                <i class="fa-sharp fa-solid fa-circle-check success-icon"></i>
                <div class="error"></div>
             </div>
            <!--Email input here-->
            <div>
                <label for="email">Email:</label>
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" id="email" placeholder="Email">
                <i class="fa-sharp fa-solid fa-circle-exclamation failure-icon"></i>
                <i class="fa-sharp fa-solid fa-circle-check success-icon"></i>
                <div class="error"></div>
            </div>
            <!--Password input here-->
            <div>
                <label for="password">Password:</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" id="password" placeholder="Password">
                <i class="fa-sharp fa-solid fa-circle-exclamation failure-icon"></i>
                <i class="fa-sharp fa-solid fa-circle-check success-icon"></i>
                <div class="error"></div>
            </div>
            <button type="submit">Submit</button>
        </form>

    </div>
</body>
<script src="SignUp.js"></script>
</html>
